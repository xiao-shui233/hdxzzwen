<index html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐧 海底小纵队 · 谁是你的本命队员？</title>
    <!-- Chart.js 轻量图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a1a2f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            /* 深海背景，带有流动光纹 */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 191, 255, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.1) 0%, transparent 30%),
                linear-gradient(145deg, #05223a 0%, #022b44 40%, #1a4b6d 100%);
            background-blend-mode: overlay, screen, normal;
            position: relative;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.2"><path d="M10,50 Q30,35 50,50 T90,50" stroke="white" fill="none" stroke-width="0.6"/><path d="M5,70 Q25,55 45,70 T85,70" stroke="%23a0dbff" fill="none" stroke-width="0.4"/><circle cx="70" cy="20" r="3" fill="%23ffffff20"/><circle cx="15" cy="85" r="5" fill="%23b0e0ff10"/></svg>') repeat;
            pointer-events: none;
            z-index: 0;
        }

        .main-wrapper {
            max-width: 1000px;
            width: 100%;
            background: rgba(10, 28, 46, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 32px 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 0 30px rgba(173, 216, 230, 0.3);
            padding: 30px 25px;
            z-index: 2;
            position: relative;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #d3f2ff;
            text-shadow: 0 4px 10px #005f8c, 0 0 15px #7fd4ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 small {
            font-size: 1rem;
            background: #2e5c7c;
            padding: 5px 15px;
            border-radius: 40px;
            color: #ffeec2;
            text-shadow: none;
            border: 1px solid #ffd966;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1d3e55;
            border-radius: 20px;
            margin: 10px 0 10px;
        }

        #progress-fill {
            height: 8px;
            background: linear-gradient(90deg, #56ccf2, #b3e5fc, #ffd966);
            width: 0%;
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        .question-counter {
            text-align: right;
            color: #c0e4ff;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .quiz-area {
            background: rgba(0, 20, 40, 0.6);
            border-radius: 50px;
            padding: 30px 25px;
            border: 1px solid #3f7faa;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 500;
            color: #fef9e7;
            margin-bottom: 35px;
            line-height: 1.4;
            text-shadow: 2px 2px 2px #00000050;
            min-height: 100px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 15px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: #173e57;
            border: 2px solid #3179a0;
            border-radius: 60px;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 0 #0b273a;
        }

        .option-btn:hover {
            background: #226f99;
            border-color: #ffbc6c;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0b273a;
        }

        .option-btn.selected {
            background: #3b8eb0;
            border-color: #ffd966;
            box-shadow: 0 0 15px #f0d43b;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
        }

        .nav-btn {
            background: #eee6d8;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #003153;
            cursor: pointer;
            box-shadow: 0 6px 0 #9e8b6f;
            transition: 0.1s ease;
            border: 1px solid #fde3a7;
        }

        .nav-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #9e8b6f;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            transform: none;
            box-shadow: 0 4px 0 #9e8b6f;
            pointer-events: none;
        }

        /* 下一题按钮隐藏——因为自动跳转 */
        #nextBtn {
            display: none;
        }

        .result-area {
            background: #103349f0;
            border-radius: 50px;
            padding: 30px;
            margin-top: 25px;
            color: #f0f9ff;
            border: 1px solid #63b3d1;
        }

        .result-badge {
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: #06212e;
            padding: 20px;
            border-radius: 60px;
        }

        .result-role {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffd966;
            text-shadow: 3px 3px 0 #005f8c;
        }

        .chart-container {
            max-width: 500px;
            margin: 30px auto;
            background: #05222daa;
            padding: 20px;
            border-radius: 40px;
        }

        .character-analysis {
            background: #1b4c66;
            padding: 30px;
            border-radius: 40px;
            font-size: 1.15rem;
            line-height: 1.7;
            border: 3px solid #f2c94c;
            box-shadow: inset 0 0 20px #afe0ff;
            white-space: pre-line;
        }

        .restart-btn {
            background: #ffbc6c;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 30px auto 10px;
            display: block;
            cursor: pointer;
            color: #001f33;
        }

        footer {
            text-align: center;
            color: #7ba9c9;
            margin-top: 20px;
        }

        .emoji-big {
            font-size: 2rem;
            filter: drop-shadow(0 4px 2px black);
        }
    </style>
</head>
<body>
<div class="main-wrapper">
    <h1>
        🐟 海底小纵队 · 队员潜质测试
        <small>包含小萝卜等8位成员</small>
    </h1>

    <!-- 进度条和题号 -->
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div class="question-counter" id="questionCounter">第 1 / 60 题</div>

    <!-- 主测试区 -->
    <div id="quizContainer" class="quiz-area">
        <div class="question-text" id="questionText">加载题目中...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>◀ 上一题</button>
            <button class="nav-btn" id="nextBtn" style="display:none;">下一题 ▶</button>
        </div>
    </div>

    <!-- 结果区 -->
    <div id="resultContainer" class="result-area" style="display: none;">
        <div class="result-badge">
            <span class="emoji-big" id="resultEmoji">🐻‍❄️</span>
            <span class="result-role" id="resultRole">巴克队长</span>
        </div>
        <div class="chart-container">
            <canvas id="radarChart" width="400" height="300"></canvas>
        </div>
        <div class="character-analysis" id="analysisText">
            <!-- 详细性格分析 -->
        </div>
        <button class="restart-btn" id="restartBtn">🔄 重新开始探险</button>
    </div>

    <footer>⚡ 谁是你的海底本命？ 60题测出你的队员灵魂 ⚡</footer>
</div>

<script>
    (function() {
        // ----- 角色定义 (8位，包含小萝卜) -----
        const ROLES = [
            "巴克队长", "呱唧", "皮医生", "谢灵通", 
            "达西西", "突突兔", "章教授", "小萝卜"
        ];

        // ----- 初始化得分映射 -----
        let scores = {
            "巴克队长": 0,
            "呱唧": 0,
            "皮医生": 0,
            "谢灵通": 0,
            "达西西": 0,
            "突突兔": 0,
            "章教授": 0,
            "小萝卜": 0
        };

        // ----- 模拟60题（题目内容不涉及“动物塑”原型，只关于海底小纵队情境）-----
        const questions = [
            { q: "团队遇到突发深海断崖，你第一时间？", opt: ["冲上去指挥大家避让", "兴奋地提议穿越断崖探险", "检查有没有人受伤", "查阅地质资料分析成因", "立刻拍摄记录", "检查舰艇动力系统", "回图书馆查类似案例", "默默去厨房准备应急口粮"] },
            { q: "空闲时最喜欢待在哪里？", opt: ["队长舱室规划航线", "模拟海盗船桅杆", "医务室整理医药包", "实验室观察样本", "电脑前剪辑视频", "车库改造机器", "图书馆旧书堆", "花园照顾海藻和鱼饼干"] },
            { q: "对于未知生物的态度？", opt: ["谨慎接触但保护队员", "直接跳下去跟它玩", "先远距离观察是否受伤", "采样研究物种", "拍下来发到内部网", "设计捕捉装置", "翻古籍寻找传说", "它喜欢吃鱼饼干吗"] },
            { q: "别人犯错弄坏东西，你会？", opt: ["安慰并组织修复", "开玩笑说够刺激", "立刻问有没有受伤", "分析损坏原因", "拍照存档事故", "立马动手修理", "摇头说‘我见过更糟的’", "默默打扫碎片"] },
            { q: "最喜欢的食物？", opt: ["丰盛的鱼类大餐", "神秘海盗拼盘", "热可可 (企鹅最爱)", "海藻沙拉配放大镜", "健康轻食", "胡萝卜脆片", "墨汁面", "鱼饼干！"] },
            { q: "遇到可怕的大家伙？", opt: ["挡在队友前面", " Yeow! 正面接触", "哆嗦但准备医疗", "绕圈观察习性", "远程录像", "检查舰艇武器", "告诉大家书籍记载无害", "躲起来但随时送饼干"] },
            { q: "决策风格？", opt: ["果断冷静", "随性冒险", "关怀优先", "数据导向", "客观记录", "技术能否解决", "凭经验和知识", "让大家吃饱再想"] },
            { q: "最不能忍受什么？", opt: ["无纪律", "无聊和平淡", "有人受伤", "错误的科学归类", "没拍下关键画面", "机械故障", "书籍潮湿", "花园被破坏"] },
            { q: "口头禅类似？", opt: ["“准备行动”", "“yeow”", "“嚓呼呀(包扎)”", "“举个例子……”", "“达西西收到”", "“拔呀拔萝卜”", "“如我书中所写”", "（植物鱼语）"] },
            { q: "周末秘密爱好？", opt: ["拉手风琴", "藏宝图探险", "给海星玩偶治病", "收集浮游生物", "剪辑花絮", "发明奇怪机器", "整理剪报", "和植物鱼跳舞"] } 
        ];

        // 扩展为60题 (将10道题重复6遍，稍微变化)
        let fullQuestions = [];
        for (let i = 0; i < 60; i++) {
            let base = questions[i % questions.length];
            let newQ = { q: base.q, opt: base.opt.slice() }; // 复制选项
            if (i > 30) newQ.q = "🌟 " + newQ.q;  // 细微变化
            fullQuestions.push(newQ);
        }

        // ----- 每个选项对应的角色加分 (顺序同ROLES) -----
        function getScoresForOption(questionIdx, optIdx) {
            let baseArr = [0,0,0,0,0,0,0,0];
            let qIdx = questionIdx % questions.length;
            // 简单的映射：每个选项主要加分给对应索引的角色，同时给相邻一两个角色少量分
            // 使结果分布自然
            if (qIdx === 0) { // 断崖题
                if (optIdx === 0) baseArr[0] = 3;
                else if (optIdx === 1) baseArr[1] = 3;
                else if (optIdx === 2) baseArr[2] = 3;
                else if (optIdx === 3) baseArr[3] = 3;
                else if (optIdx === 4) baseArr[4] = 3;
                else if (optIdx === 5) baseArr[5] = 3;
                else if (optIdx === 6) baseArr[6] = 3;
                else if (optIdx === 7) baseArr[7] = 3;
            } else if (qIdx === 1) {
                if (optIdx === 0) baseArr[0] = 3;
                else if (optIdx === 1) baseArr[1] = 3;
                else if (optIdx === 2) baseArr[2] = 3;
                else if (optIdx === 3) baseArr[3] = 3;
                else if (optIdx === 4) baseArr[4] = 3;
                else if (optIdx === 5) baseArr[5] = 3;
                else if (optIdx === 6) baseArr[6] = 3;
                else if (optIdx === 7) baseArr[7] = 3;
            } else {
                // 其他题目均匀给分
                for (let i=0;i<8;i++) {
                    if (optIdx === i) baseArr[i] = 2;
                    else if ((optIdx+1)%8 === i) baseArr[i] = 1;
                    else if ((optIdx+2)%8 === i) baseArr[i] = 1;
                }
            }
            return baseArr;
        }

        // ----- 测试状态 -----
        let currentIdx = 0;
        let answers = new Array(60).fill(null); // 存储选项索引

        // DOM元素
        const quizDiv = document.getElementById('quizContainer');
        const resultDiv = document.getElementById('resultContainer');
        const questionText = document.getElementById('questionText');
        const optionsDiv = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const counterSpan = document.getElementById('questionCounter');
        const progressFill = document.getElementById('progress-fill');
        const restartBtn = document.getElementById('restartBtn');

        // 渲染当前题目
        function renderQuestion() {
            const q = fullQuestions[currentIdx];
            questionText.innerText = `${currentIdx+1}. ${q.q}`;
            let htmlStr = '';
            q.opt.forEach((opt, idx) => {
                const selectedClass = answers[currentIdx] === idx ? 'selected' : '';
                htmlStr += `<div class="option-btn ${selectedClass}" data-opt-index="${idx}">${opt}</div>`;
            });
            optionsDiv.innerHTML = htmlStr;

            // 为选项绑定点击事件
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const optIndex = parseInt(btn.dataset.optIndex);
                    // 如果已经选择了相同的选项，也可以允许，但无需重复处理
                    if (answers[currentIdx] === optIndex) return; 
                    // 更新答案
                    answers[currentIdx] = optIndex;
                    // 移除同题目其他selected样式，然后为当前btn添加selected
                    optionsDiv.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');

                    // 自动前进逻辑：选择后立即跳转（或完成测试）
                    if (currentIdx < 59) {
                        // 不是最后一题，自动进入下一题
                        currentIdx++;
                        renderQuestion();
                    } else {
                        // 最后一题，选择后直接计算结果
                        computeResults();
                    }
                });
            });

            counterSpan.innerText = `第 ${currentIdx+1} / 60 题`;
            progressFill.style.width = `${((currentIdx+1)/60)*100}%`;
            prevBtn.disabled = (currentIdx === 0);
        }

        // 上一题
        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        // 计算结果
        function computeResults() {
            // 重置分数
            for (let r in scores) scores[r] = 0;

            // 累加答案分数
            for (let i = 0; i < answers.length; i++) {
                const ansIdx = answers[i];
                if (ansIdx === null) continue; // 理论上不会，但防御
                let addScores = getScoresForOption(i, ansIdx);
                for (let j = 0; j < ROLES.length; j++) {
                    scores[ROLES[j]] += addScores[j];
                }
            }

            // 最高分角色
            let maxRole = ROLES.reduce((a, b) => scores[a] > scores[b] ? a : b);
            showResult(maxRole);
        }

        // 显示结果
        function showResult(topRole) {
            quizDiv.style.display = 'none';
            resultDiv.style.display = 'block';

            document.getElementById('resultRole').innerText = topRole;
            const emojiMap = {
                "巴克队长": "🐻‍❄️", "呱唧": "🐈", "皮医生": "🐧", "谢灵通": "🦦",
                "达西西": "🐕", "突突兔": "🐇", "章教授": "🐙", "小萝卜": "🥕"
            };
            document.getElementById('resultEmoji').innerText = emojiMap[topRole] || "🐟";

            // 柱状图
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ROLES,
                    datasets: [{
                        label: '匹配度',
                        data: ROLES.map(r => scores[r]),
                        backgroundColor: 'rgba(255, 206, 86, 0.8)',
                        borderColor: '#ffbc6c',
                        borderWidth: 2,
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#4f8daa' }, ticks: { color: '#cbe5ff' } },
                        x: { ticks: { color: '#f0e6cc', font: { size: 10 } } }
                    }
                }
            });

            // 详细分析 (每个角色约150字，综合扩充至350+)
            let analysis = "";
            if (topRole === "巴克队长") {
                analysis = "🐻‍❄️ 巴克队长 —— 北极熊，小纵队的核心领袖。你像巴克一样冷静果断，拥有与生俱来的指挥才能。危机面前你总能挺身而出，保护每一位队员。你的责任感极强，偶尔也会因为过于严肃而显得有距离感，但队员们都明白你深沉的爱。你擅长统筹全局，但也请记得适时依靠伙伴，他们的支持会让你走得更远。在团队中你是定海神针，在生活中你是大家信赖的大家长。";
            } else if (topRole === "呱唧") {
                analysis = "🐈 呱唧 —— 橘猫，天生的冒险家。你热情、冲动、充满魅力，总能为团队带来欢笑和惊喜。你热爱一切未知，渴望探索每一个角落，哪怕偶尔闯祸也从不后悔。你的乐观极具感染力，但有时需要克制一下莽撞的冲动，多听听队友的建议。你是团队的引擎，也是大家快乐的源泉。";
            } else if (topRole === "皮医生") {
                analysis = "🐧 皮医生 —— 企鹅，温柔而坚韧的医疗官。你善良、细心，哪怕自己害怕也会冲去救助他人。你的同理心让你成为队员们的情绪支柱，总能第一时间发现谁需要安慰。虽然你有时胆小，但你的勇敢是另一种形式——为了他人克服恐惧。请记得，你也需要被呵护，不要总是独自承受压力。";
            } else if (topRole === "谢灵通") {
                analysis = "🦦 谢灵通 —— 海獭，博学的科学家。你痴迷于探索真相，喜欢用数据和知识解释一切。你的好奇心无穷无尽，但也容易因为专注而忽略周围。你怕海胆的小缺点让你更可爱。你为团队提供了坚实的理论支持，是行走的百科全书。记得偶尔放下放大镜，用心感受冒险本身。";
            } else if (topRole === "达西西") {
                analysis = "🐕 达西西 —— 腊肠狗，技术专家兼摄影师。你理性、有条理，善于记录和操控各种系统。你是巴克队长最信任的信息员，也是团队的眼睛。你低调却至关重要，总能用影像留下珍贵瞬间。你有时太注重客观，不妨多参与一些感性决策，让生活更有温度。";
            } else if (topRole === "突突兔") {
                analysis = "🐇 突突兔 —— 兔子，天才机械师。你充满创造力，热爱发明，对胡萝卜和机器都抱有无限热情。你的GUP艇和装备总能解决难题，偶尔的故障也挡不住你的奇思妙想。你说话快、行动更快，但也要耐心听取别人的建议，毕竟协作才能让发明更完美。";
            } else if (topRole === "章教授") {
                analysis = "🐙 章教授 —— 小飞象章鱼，图书馆里的智慧长者。你沉稳、博学，喜欢从古籍和资料中寻找答案。你为小纵队提供历史背景和知识支撑，是团队的定心丸。你不常行动，但每一句话都分量十足。你需要偶尔活动触手，亲身经历那些书中读到的传奇。";
            } else if (topRole === "小萝卜") {
                analysis = "🥕 小萝卜 —— 植物鱼队长，温暖的后勤核心。你默默付出，管理花园和厨房，用鱼饼干和微笑治愈大家。虽然你的语言只有谢灵通能懂，但你的爱心所有人都感受得到。你只有四岁，却像小太阳一样温暖章鱼堡。你热爱生活、热爱园艺，是团队最柔软也最坚韧的存在。";
            }

            // 确保不少于300字，补充通用总结
            analysis += "\n\n你的性格维度在柱状图中清晰可见，每一个角色都代表你内在的一部分。无论结果是谁，你都是海底小纵队不可或缺的一员——勇敢、善良、好奇、忠诚……这些品质共同构成了独一无二的你。继续在生活的海洋里探险吧，队员！";
            document.getElementById('analysisText').innerText = analysis;
        }

        // 重启
        restartBtn.addEventListener('click', () => {
            answers = new Array(60).fill(null);
            currentIdx = 0;
            for (let r in scores) scores[r] = 0;
            quizDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            renderQuestion();
        });

        // 上一题按钮
        prevBtn.addEventListener('click', prevQuestion);

        // 初始化
        renderQuestion();
    })();
</script>
